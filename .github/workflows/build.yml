name: Build and Upload Artifact

on:
  push:
    branches:
      - beta
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Discord Notification (Build Start)
        # 各アーキテクチャごとに独立した「開始」メッセージを即時投稿
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ github.ref_name == 'main' && secrets.DISCORD_WEBHOOK_URL_PRODUCTION || github.ref_name == 'beta' && secrets.DISCORD_WEBHOOK_URL_BETA || secrets.DISCORD_WEBHOOK_URL_STAGING }}
          DISCORD_NOTIFY_MODE: build-start
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'N/A' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TARGET_ARCH: ${{ matrix.goarch }}
          DISCORD_MESSAGE_ID_PATH: .discord/message_id
        run: python .github/scripts/discord_webhook.py

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Determine target
        id: target
        run: |
          ARCH="${{ matrix.goarch }}"
          echo "goarch=${ARCH}" >> $GITHUB_OUTPUT
          echo "binary_name=chunisupport-api-linux-${ARCH}" >> $GITHUB_OUTPUT

      - name: Build binary
        id: build-binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ steps.target.outputs.goarch }}
        run: |
          BUILD_DATE=$(date -u +%Y%m%d)
          REVISION=$(git rev-parse --short HEAD)
          go build -trimpath \
            -ldflags="-s -w -X github.com/chunisupport/chunisupport-api/internal/info.BuildDate=${BUILD_DATE} -X github.com/chunisupport/chunisupport-api/internal/info.Revision=${REVISION}" \
            -o "${{ steps.target.outputs.binary_name }}" ./cmd/api

      - name: Package (binary + migration, flat structure)
        id: package
        run: |
          tar -czf ${{ steps.target.outputs.binary_name }}.tar.gz \
            ${{ steps.target.outputs.binary_name }} migration/

      - name: Upload artifact
        id: upload-artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.target.outputs.binary_name }}.tar.gz
          archive: false
          overwrite: true
          retention-days: 3

      - name: Discord Notification (Build Complete)
        # 各アーキテクチャごとの開始メッセージを「完了/失敗」に編集
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ github.ref_name == 'main' && secrets.DISCORD_WEBHOOK_URL_PRODUCTION || github.ref_name == 'beta' && secrets.DISCORD_WEBHOOK_URL_BETA || secrets.DISCORD_WEBHOOK_URL_STAGING }}
          DISCORD_NOTIFY_MODE: build-complete
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'N/A' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_RESULT: ${{ steps.build-binary.outcome == 'success' && steps.package.outcome == 'success' && steps.upload-artifact.outcome == 'success' && 'success' || 'failure' }}
          TARGET_ARCH: ${{ matrix.goarch }}
          DISCORD_MESSAGE_ID_PATH: .discord/message_id
        run: python .github/scripts/discord_webhook.py

  # ------------------------------------------------------------
  # Discord 通知
  # - amd64 と arm64 はそれぞれ完全に独立した Discord メッセージを投稿する
  # - 旧設計（notify-start ジョブ + discord-message-id-*** artifact による共有メッセージ更新）は廃止
  # - 実際の通知送信処理は .github/scripts/discord_webhook.py に委譲（urllibのみで依存なし）
  # - 対象ブランチ用の Discord Webhook Secret が未設定の場合はスクリプト側で自動スキップ
  # ------------------------------------------------------------

