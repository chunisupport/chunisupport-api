name: Build and Upload Artifact

on:
  push:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'

      - name: Determine target
        id: target
        run: |
          ARCH="${{ matrix.goarch }}"
          echo "goarch=${ARCH}" >> $GITHUB_OUTPUT
          echo "binary_name=chunisupport-api-linux-${ARCH}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ steps.target.outputs.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" -o ${{ steps.target.outputs.binary_name }} .

      - name: Package (binary + migration, flat structure)
        run: |
          tar -czf ${{ steps.target.outputs.binary_name }}.tar.gz \
            ${{ steps.target.outputs.binary_name }} migration/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.target.outputs.binary_name }}.tar.gz
          archive: false
          overwrite: true
          retention-days: 3
