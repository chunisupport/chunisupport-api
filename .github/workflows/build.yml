name: Build and Upload Artifact

on:
  push:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    needs: notify-start
    if: always()
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'

      - name: Determine target
        id: target
        run: |
          ARCH="${{ matrix.goarch }}"
          echo "goarch=${ARCH}" >> $GITHUB_OUTPUT
          echo "binary_name=chunisupport-api-linux-${ARCH}" >> $GITHUB_OUTPUT

      - name: Build binary
        id: build-binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ steps.target.outputs.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" -o ${{ steps.target.outputs.binary_name }} .

      - name: Package (binary + migration, flat structure)
        id: package
        run: |
          tar -czf ${{ steps.target.outputs.binary_name }}.tar.gz \
            ${{ steps.target.outputs.binary_name }} migration/

      - name: Upload artifact
        id: upload-artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.target.outputs.binary_name }}.tar.gz
          archive: false
          overwrite: true
          retention-days: 3

      - name: Download Discord Message ID
        if: always()
        uses: actions/download-artifact@v7
        with:
          name: discord-message-id-${{ github.run_id }}
          path: .discord
        continue-on-error: true

      - name: Discord Notification (Build Complete by Arch)
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ github.ref_name == 'main' && secrets.DISCORD_WEBHOOK_URL_PRODUCTION || github.ref_name != 'main' && secrets.DISCORD_WEBHOOK_URL_STAGING || '' }}
          DISCORD_NOTIFY_MODE: build-arch-complete
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'N/A' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_RESULT: ${{ steps.build-binary.outcome == 'success' && steps.package.outcome == 'success' && steps.upload-artifact.outcome == 'success' && 'success' || 'failure' }}
          TARGET_ARCH: ${{ matrix.goarch }}
          DISCORD_MESSAGE_ID_PATH: .discord/message_id
        run: python .github/scripts/discord_webhook.py

  # ------------------------------------------------------------
  # Discord 通知ジョブ
  # - notify-start:    プッシュ検知と同時に「ビルド開始」通知を送信（build完了を待たない）
  # - build:           各アーキテクチャのビルド完了時に該当 Embed のみ結果へ更新
  # 実際の通知送信処理は .github/scripts/discord_webhook.py に委譲（urllibのみで依存なし）
  # 対象ブランチ用の Discord Webhook Secret が未設定の場合はスクリプト側で自動スキップ
  # ------------------------------------------------------------
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Discord Notification (Build Start)
        env:
          DISCORD_WEBHOOK_URL: ${{ github.ref_name == 'main' && secrets.DISCORD_WEBHOOK_URL_PRODUCTION || github.ref_name != 'main' && secrets.DISCORD_WEBHOOK_URL_STAGING || '' }}
          DISCORD_NOTIFY_MODE: build-start
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'N/A' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DISCORD_MESSAGE_ID_PATH: .discord/message_id
        run: python .github/scripts/discord_webhook.py

      - name: Upload Discord Message ID
        uses: actions/upload-artifact@v7
        with:
          name: discord-message-id-${{ github.run_id }}
          path: .discord/message_id
          if-no-files-found: ignore
          retention-days: 1

